# Finance fine-tuning configuration
# Optimized for financial analysis, sentiment, Q&A, and report interpretation
# Target GPU: A100 80GB or H100 80GB

domain: "finance"
run_name: "qwen2.5-72b-finance-qlora"

model:
  name: "Qwen/Qwen2.5-72B-Instruct"
  attn_implementation: "flash_attention_2"

lora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  bias: "none"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

data:
  # Run download_datasets.py --domain finance first
  train_files:
    - "./data/processed/finance.jsonl"
  chat_template: "chatml"
  num_proc: 4
  val_size: 0.02

training:
  num_epochs: 4                     # Finance data is smaller; more passes improve accuracy
  batch_size: 2
  eval_batch_size: 2
  gradient_accumulation_steps: 8
  max_seq_length: 4096              # Financial reports can be long; increase to 8192 if needed
  learning_rate: 1.5e-4
  lr_scheduler: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  bf16: true
  fp16: false
  gradient_checkpointing: true
  max_grad_norm: 0.3
  logging_steps: 10
  save_steps: 200
  eval_steps: 200
  packing: true
  optimizer: "paged_adamw_32bit"
  dataloader_workers: 4
  save_total_limit: 3
  report_to:
    - "tensorboard"

output:
  dir: "./outputs/finance"

# Notes:
# - Financial PhraseBank: ~2.3K agree-all examples (high-quality labels)
# - FinQA: ~6.2K train examples with numerical reasoning chains
# - Finance Alpaca: ~68K instruction-following pairs
# - Expected training time: ~6-8 hours on A100 80GB (with Alpaca data)
